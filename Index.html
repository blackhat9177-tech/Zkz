<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deposit Withdraw Buttons</title>

<style>
body {
    background: #7a3f00; /* brown background like image */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

/* Container */
.button-wrapper {
    display: flex;
    gap: 30px;
}

/* Common button style */
.btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 40px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: bold;
    color: white;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.3s ease;
}

/* Deposit Button */
.deposit {
    background: linear-gradient(to right, #0bbf3f, #059b30);
}

.deposit:hover {
    background: linear-gradient(to right, #0dd44a, #07b83a);
}

/* Withdraw Button */
.withdraw {
    background: linear-gradient(to right, #ff1a1a, #cc0000);
}

.withdraw:hover {
    background: linear-gradient(to right, #ff3333, #e60000);
}

/* Icon Style */
.icon {
    font-size: 26px;
}
</style>

</head>
<body>

<div class="button-wrapper">
    <div class="btn deposit">
        <span class="icon">💰</span>
        Deposit
    </div>

    <div class="btn withdraw">
        <span class="icon">💳</span>
        Withdraw
    </div>
</div>

</body>
</html>
