<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header with Buttons</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* Header */
    .header {
        background: #111;
        padding: 15px;
        display: flex;
        justify-content: center;
      
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
    }

    .btn {
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
    }

    .whatsapp {
        background: #25D366;
    }

    .deposit {
        background: #007bff;
    }

    .withdrawal {
        background: #ff4d4d;
    }

    .btn:hover {
        opacity: 0.85;
    }

    /* Iframe section */
    .iframe-container {
        margin-top: 80px;
        width: 100%;
        height: calc(100vh - 80px);
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>

</head>
<body>

<!-- Header -->
<div class="header">
    <a href="https://wa.me/9685721765" class="btn whatsapp" target="_blank">WhatsApp</a>
    <a href="https://wa.me/9685721765" class="btn deposit">Deposit</a>
    <a href="https://wa.me/9685721765" class="btn withdrawal">Withdrawal</a>
</div>

<!-- Bottom Iframe -->
<div class="iframe-container">
    <iframe src="http://bnw247.com"></iframe>
</div>

</body>
</html>
