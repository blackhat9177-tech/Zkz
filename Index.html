<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambani Book</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Header Buttons */
.button-wrapper {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 12px;
    position: fixed;
    top: 0;
    width: 100%;
    background: linear-gradient(135deg, #1a3da6, #0f2462);
    z-index: 1000;
    flex-wrap: wrap;
}

/* Buttons */
.btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    color: white;
    border: none;
    cursor: pointer;
    text-decoration: none;
}

/* Colors */
.deposit { background: #0bbf3f; }
.withdraw { background: #ff1a1a; }

/* Iframe */
.iframe-container {
    margin-top: 70px;
    height: calc(100vh - 70px);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

/* Popup Box */
.popup-content {
    background: #fff;
    width: 90%;
    max-width: 400px;
    border-radius: 12px;
    padding: 20px;
    animation: fadeIn 0.3s ease;
}

/* Animation */
@keyframes fadeIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Close */
.close {
    float: right;
    cursor: pointer;
    font-size: 18px;
}

/* Input Section */
.input-box {
    border: 1px solid #ddd;
    border-radius: 8px;
    display: flex;
    overflow: hidden;
    margin-top: 10px;
}

.input-box input {
    flex: 1;
    border: none;
    padding: 12px;
    outline: none;
}

/* Submit */
.submit-btn {
    background: #d90429;
    color: #fff;
    border: none;
    padding: 0 20px;
    font-weight: bold;
    cursor: pointer;
}

/* Rules */
.rules {
    font-size: 12px;
    color: #d90429;
    margin-top: 15px;
    line-height: 1.5;
}
</style>

</head>
<body>

<!-- Header -->
<div class="button-wrapper">

    <button class="btn deposit" onclick="openPopup()">💰 Deposit</button>

    <a href="https://wa.me/919685721765?text=Hello%20sir%20withdrawal" 
       class="btn withdraw" target="_blank">
        💳 Withdraw
    </a>

</div>

<!-- Iframe -->
<div class="iframe-container">
    <iframe src="https://bnw247.com"></iframe>
</div>

<!-- Popup -->
<div class="popup" id="popup" onclick="outsideClick(event)">
    <div class="popup-content">
        
        <span class="close" onclick="closePopup()">✖</span>

        <h3>Amount</h3>

        <div class="input-box">
            <input type="number" id="amount" placeholder="Enter amount">
            <button class="submit-btn" onclick="submitDeposit()">SUBMIT</button>
        </div>

        <div class="rules">
        1. Deposit money only in available accounts.<br><br>
        2. Deposits after 45 min still valid.<br><br>
        3. Not responsible for old accounts.<br><br>
        4. Add UTR after deposit.<br><br>
        5. NEFT: 40 min – 2 hrs.<br><br>
        6. Payment valid 1 hour after change.
        </div>

    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function outsideClick(e) {
    if (e.target.id === "popup") {
        closePopup();
    }
}

function submitDeposit() {
    let amount = document.getElementById("amount").value;

    if(amount){
        let link = `upi://pay?pa=9685721765@paytm&pn=Admin&am=${amount}&cu=INR&tn=Deposit`;
        window.location.href = link;
    } else {
        alert("Enter amount");
    }
}
</script>

</body>
</html>
