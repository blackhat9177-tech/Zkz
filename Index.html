<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambani Book</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
   
}

/* Top Buttons Bar */
.button-wrapper {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    position: fixed;
    top: 0;
    width: 100%;
    background: #1a3da6;
    z-index: 1000;
    flex-wrap: wrap;
}

/* Button Style */
.btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 25px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    text-transform: uppercase;
    text-decoration: none;
    transition: 0.25s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Hover */
.btn:hover {
    transform: translateY(-2px);
}

/* Colors */
.deposit { background: linear-gradient(135deg, #0bbf3f, #059b30); }
.withdraw { background: linear-gradient(135deg, #ff1a1a, #cc0000); }
.upi { background: linear-gradient(135deg, #5f259f, #4a1d7a); }

/* Iframe */
.iframe-container {
    margin-top: 80px;
    width: 100%;
    height: calc(100vh - 80px);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>

</head>
<body>

<!-- Buttons -->
<div class="button-wrapper">

    <a href="https://wa.me/919685721765?text=Hello%20sir%20deposit" 
       class="btn deposit" target="_blank">
        💰 Deposit
    </a>

    <a href="https://wa.me/919685721765?text=Hello%20sir%20withdrawal" 
       class="btn withdraw" target="_blank">
        💳 Withdraw
    </a>

    

</div>

<!-- Iframe -->
<div class="iframe-container">
    <iframe src="https://bnw247.com"></iframe>
</div>

</body>
</html>
