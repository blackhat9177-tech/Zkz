<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambani Book</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Header */
.button-wrapper {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    position: fixed;
    top: 0;
    width: 100%;
    background: linear-gradient(135deg, #1a3da6, #0f2462);
    z-index: 1000;
    flex-wrap: wrap;
}

.btn {
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    color: white;
    border: none;
    cursor: pointer;
    text-decoration: none;
}

.deposit { background: #0bbf3f; }
.withdraw { background: #ff1a1a; }

/* Iframe */
.iframe-container {
    margin-top: 60px;
    height: calc(100vh - 60px);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: #fff;
    width: 90%;
    max-width: 400px;
    border-radius: 12px;
    padding: 20px;
}

.close {
    float: right;
    cursor: pointer;
}

/* Input box */
.input-box {
    display: flex;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    margin-top: 10px;
}

.input-box input {
    flex: 1;
    border: none;
    padding: 12px;
    outline: none;
}

.submit-btn {
    background: #d90429;
    color: white;
    border: none;
    padding: 0 20px;
    cursor: pointer;
}

/* Rules */
.rules {
    font-size: 12px;
    color: red;
    margin-top: 15px;
}

/* UTR Box */
#utrBox {
    display: none;
    padding: 15px;
    background: #f5f5f5;
}

#utrBox input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}
</style>

</head>
<body>

<!-- Header -->
<div class="button-wrapper">
    <button class="btn deposit" onclick="openPopup()">💰 Deposit</button>

    <a href="https://wa.me/919685721765?text=Hello%20sir%20withdrawal" 
       class="btn withdraw" target="_blank">💳 Withdraw</a>
</div>

<!-- Iframe -->
<div class="iframe-container">
    <iframe src="https://bnw247.com"></iframe>
</div>

<!-- Deposit Popup -->
<div class="popup" id="popup" onclick="outsideClick(event)">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">✖</span>
        <h3>Amount</h3>

        <div class="input-box">
            <input type="number" id="amount" placeholder="Enter amount">
            <button class="submit-btn" onclick="submitDeposit()">SUBMIT</button>
        </div>

        <div class="rules">
            1. Deposit only in available accounts.<br><br>
            2. Deposits after 45 min valid.<br><br>
            3. Not responsible for old accounts.<br><br>
            4. Add UTR after deposit.<br><br>
            5. NEFT: 40 min – 2 hrs.<br><br>
            6. Valid for 1 hour after change.
        </div>
    </div>
</div>

<!-- UTR FORM -->
<div id="utrBox">
    <h3>Submit Payment Details</h3>

    <input type="text" id="utr" placeholder="Enter UTR Number">
    <input type="number" id="finalAmount" readonly>
    <input type="file">

    <button onclick="sendToWhatsapp()" 
            style="width:100%; padding:12px; background:#25D366; color:#fff; border:none;">
        Submit Details
    </button>
</div>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function outsideClick(e) {
    if (e.target.id === "popup") {
        closePopup();
    }
}

function submitDeposit() {
    let amount = document.getElementById("amount").value;

    if(amount){
        let link = `upi://pay?pa=9685721765@paytm&pn=Admin&am=${amount}&cu=INR&tn=Deposit`;
        window.location.href = link;

        setTimeout(() => {
            closePopup();
            document.getElementById("utrBox").style.display = "block";
            document.getElementById("finalAmount").value = amount;
        }, 2000);

    } else {
        alert("Enter amount");
    }
}

function sendToWhatsapp() {
    let utr = document.getElementById("utr").value;
    let amount = document.getElementById("finalAmount").value;

    if(utr && amount){
        let msg = `Hello sir,%0AI deposited ₹${amount}%0AUTR: ${utr}`;
        let url = `https://wa.me/919685721765?text=${msg}`;
        window.open(url, "_blank");
    } else {
        alert("Fill all details");
    }
}
</script>

</body>
</html>
